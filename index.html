<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiAnime</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b0b0f;
    color:white;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
}

.logo{
    font-size:32px;
    color:#ffb800;
    font-weight:bold;
}

.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:40px;
}

.hero p{
    margin-top:10px;
}

.card{
    background:#17171f;
    margin:20px;
    padding:20px;
    border-radius:10px;
    text-align:center;
}
</style>
</head>

<body>

<header>
<div class="logo">🎌 HiAnime</div>
</header>
<section class="search-box">
    <input type="text" placeholder="🔍 Search Anime...">
</section>

<section class="hero">
<h1>Welcome to HiAnime</h1>
<p>Watch your favorite anime here.</p>
</section>

<div class="card">
<h2>Solo Leveling</h2>
</div>

<div class="card">
<h2>Demon Slayer</h2>
</div>

<div class="card">
<h2>Jujutsu Kaisen</h2>
</div>

</body>
    </html>
